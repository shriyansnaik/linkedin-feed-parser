<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 260px;
      padding: 16px;
      margin: 0;
      background: #f3f2ef;
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    h2 { margin: 0; font-size: 15px; color: #0a66c2; }
    .settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      padding: 0 2px;
      color: #666;
      line-height: 1;
    }
    .settings-btn:hover { color: #0a66c2; }
    p.sub { margin: 0 0 14px; font-size: 12px; color: #666; }
    .key-status {
      font-size: 11px;
      color: #555;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 6px 10px;
      margin-bottom: 12px;
    }
    .key-status.warn { color: #a05000; background: #fff8ed; border-color: #f0c070; }
    button.parse {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: #0a66c2;
      color: #fff;
    }
    button.parse:hover { background: #004182; }
    button.parse:disabled { background: #aaa; cursor: default; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #555;
      text-align: center;
      min-height: 18px;
    }
    #status.err { color: #c00; }
  </style>
</head>
<body>
  <div class="top">
    <h2>LinkedIn Feed Parser</h2>
    <button class="settings-btn" id="settingsBtn" title="Settings">⚙</button>
  </div>
  <p class="sub">Open your LinkedIn feed, then click below.</p>
  <div class="key-status" id="keyStatus">Loading…</div>
  <button class="parse" id="parseBtn">Parse Feed</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
