<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Feed Parser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", system-ui, sans-serif;
      background: #f0f0f0;
      color: #111;
      min-height: 100vh;
      padding-bottom: 60px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Top bar ─────────────────────────────────── */
    .topbar {
      position: sticky; top: 0; z-index: 99;
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid #e5e5e5;
      padding: 0 24px;
    }
    .topbar-inner {
      max-width: 1100px; margin: 0 auto;
      height: 54px;
      display: flex; align-items: center; gap: 20px;
    }
    .logo { font-size: 14px; font-weight: 700; color: #111; white-space: nowrap; }
    .logo span { color: #2563eb; }

    .prog-wrap { flex: 1; }
    .prog-labels { display: flex; justify-content: space-between; font-size: 11px; color: #999; margin-bottom: 5px; }
    .prog-track { height: 3px; background: #e5e5e5; border-radius: 99px; overflow: hidden; }
    .prog-fill { height: 100%; background: #111; border-radius: 99px; transition: width .4s ease; width: 0%; }

    .filter-label { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: #555; cursor: pointer; white-space: nowrap; }
    .filter-label input { accent-color: #111; cursor: pointer; }

    /* ── Grid ───────────────────────────────────── */
    #cards {
      max-width: 1100px; margin: 28px auto 0;
      padding: 0 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px;
    }

    /* ── Flip card shell ─────────────────────────── */
    .card {
      height: 300px;
      perspective: 1200px;
      cursor: pointer;
    }
    .card.hidden { display: none; }

    .card-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform .55s cubic-bezier(.4,0,.2,1);
    }
    .card.flipped .card-inner { transform: rotateY(180deg); }

    .card-front,
    .card-back {
      position: absolute; inset: 0;
      background: #fff;
      border-radius: 20px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }
    .card-back { transform: rotateY(180deg); overflow-y: auto; }

    /* ── FRONT ───────────────────────────────────── */
    .front-wrap {
      height: 100%;
      padding: 20px 22px 18px;
      display: flex; flex-direction: column;
    }

    /* Top row: avatar + name + time */
    .front-top {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
    }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      object-fit: cover; flex-shrink: 0;
      background: #e5e5e5;
    }
    .avatar-placeholder {
      width: 40px; height: 40px; border-radius: 50%;
      background: #e5e5e5; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; color: #999;
    }
    .front-top-meta { flex: 1; min-width: 0; }
    .poster-name {
      font-size: 13px; font-weight: 600; color: #111;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .poster-name a { color: inherit; text-decoration: none; }
    .poster-name a:hover { color: #2563eb; }
    .poster-badges { display: flex; gap: 4px; margin-top: 2px; flex-wrap: wrap; }
    .badge {
      font-size: 9px; font-weight: 700; letter-spacing: .4px;
      padding: 1px 5px; border-radius: 4px; text-transform: uppercase;
    }
    .badge-v { background: #eff6ff; color: #2563eb; }
    .badge-p { background: #fffbeb; color: #b45309; }
    .badge-d { background: #f5f5f5; color: #777; }
    .front-time {
      font-size: 11px; color: #bbb; font-weight: 400;
      white-space: nowrap; flex-shrink: 0;
      align-self: flex-start;
    }

    /* Role title */
    .job-title {
      font-size: 20px; font-weight: 800; color: #111;
      line-height: 1.2; letter-spacing: -.02em;
      margin-bottom: 10px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Tags */
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      font-size: 12px; font-weight: 500; color: #333;
      border: 1.5px solid #e0e0e0; border-radius: 8px;
      padding: 4px 10px; line-height: 1;
      display: inline-flex; align-items: center; gap: 5px;
      background: #fff;
    }
    .tag svg { flex-shrink: 0; }

    /* Spacer */
    .front-spacer { flex: 1; }

    /* Bottom row */
    .front-bottom {
      display: flex; align-items: flex-end; justify-content: space-between;
      gap: 8px;
    }
    .comp-loc { }
    .company-name {
      font-size: 15px; font-weight: 700; color: #111;
      letter-spacing: -.01em; line-height: 1.2;
    }
    .company-name.dim { font-size: 13px; font-weight: 500; color: #bbb; }
    .compensation-small { font-size: 11px; color: #888; margin-top: 3px; }

    /* Action buttons - circles */
    .actions { display: flex; gap: 7px; }
    .action-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; text-decoration: none;
      transition: transform .15s, box-shadow .15s;
      flex-shrink: 0;
    }
    .action-btn:hover { transform: scale(1.1); }
    .action-btn:active { transform: scale(.95); }
    .btn-connect { background: #111; color: #fff; }
    .btn-connect:hover { box-shadow: 0 4px 12px rgba(0,0,0,.25); }
    .btn-email   { background: #f0f0f0; color: #555; }
    .btn-email:hover { background: #e5e5e5; }
    .btn-email-sent { background: #e8f5e9 !important; color: #4caf50 !important; cursor: not-allowed !important; opacity: .75; }
    .btn-email-sent:hover { background: #e8f5e9 !important; transform: none !important; }
    .btn-apply   { background: #111; color: #fff; }
    .btn-apply:hover { box-shadow: 0 4px 12px rgba(0,0,0,.25); }

    /* ── BACK ────────────────────────────────────── */
    .back-wrap { padding: 20px 22px; }
    .back-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .back-title { font-size: 13px; font-weight: 700; color: #111; }
    .back-flip {
      width: 28px; height: 28px; border-radius: 50%;
      background: #f0f0f0; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #555; transition: background .15s;
      flex-shrink: 0;
    }
    .back-flip:hover { background: #e5e5e5; }

    .back-section { margin-bottom: 14px; }
    .back-section-label {
      font-size: 10px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: #bbb; margin-bottom: 6px;
    }
    .back-summary { font-size: 13px; color: #444; line-height: 1.65; }
    .skills-wrap { display: flex; flex-wrap: wrap; gap: 5px; }
    .skill-tag {
      font-size: 11px; font-weight: 500;
      background: #f5f5f5; color: #333;
      padding: 3px 9px; border-radius: 6px;
      border: 1px solid #eee;
    }
    .back-meta-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .back-meta-item {
      font-size: 12px; color: #555;
      background: #f5f5f5; padding: 4px 10px; border-radius: 8px;
    }

    /* Non-job card */
    .not-job-front {
      height: 100%; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 20px; gap: 8px;
    }
    .not-job-name { font-size: 13px; font-weight: 600; color: #555; }
    .not-job-label { font-size: 12px; color: #bbb; }

    /* Error card */
    .error-front {
      height: 100%; display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start; padding: 20px; gap: 8px;
    }
    .error-name { font-size: 13px; font-weight: 600; }
    .error-msg { font-size: 12px; color: #dc2626; line-height: 1.5; }
    .retry-btn {
      margin-top: 4px;
      background: #f5f5f5; border: 1px solid #ddd; border-radius: 20px;
      padding: 5px 14px; font-size: 12px; font-weight: 600; color: #555;
      cursor: pointer; transition: background .15s;
    }
    .retry-btn:hover { background: #e5e5e5; color: #111; }

    /* ── Alerts ──────────────────────────────────── */
    #noKeysMsg {
      max-width: 1100px; margin: 16px auto 0; padding: 13px 24px;
      background: #fffbeb; border: 1px solid #fde68a; border-radius: 12px;
      font-size: 13px; color: #92400e;
    }
    #noKeysMsg a { color: #2563eb; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-inner">
      <div class="logo">Feed<span>Parser</span></div>
      <div class="prog-wrap">
        <div class="prog-labels">
          <span id="progressText">Loading…</span>
          <span id="progressCount"></span>
        </div>
        <div class="prog-track"><div class="prog-fill" id="progressFill"></div></div>
      </div>
      <label class="filter-label">
        <input type="checkbox" id="jobOnlyToggle"> Jobs only
      </label>
    </div>
  </div>

  <div id="noKeysMsg" style="display:none">
    ⚠ No LLM keys configured.
    <a id="openSettingsLink">Add a key in Settings →</a>
  </div>

  <div id="cards"></div>

  <!-- ── Email modal ───────────────────────────────────── -->
  <div id="emailOverlay" style="display:none">
    <div id="emailModal">
      <div class="em-header">
        <div class="em-title">Draft Email</div>
        <button class="em-close" id="emailClose">✕</button>
      </div>

      <div id="emLoading" class="em-loading">
        <div class="em-spinner"></div>
        Writing personalised draft…
      </div>

      <div id="emForm" style="display:none">
        <div class="em-field">
          <label>To</label>
          <input type="text" id="emTo" readonly>
        </div>
        <div class="em-field">
          <label>Subject</label>
          <input type="text" id="emSubject">
        </div>
        <div class="em-field">
          <label>Body</label>
          <textarea id="emBody" rows="12"></textarea>
        </div>
        <div class="em-instruction-row">
          <input type="text" id="emInstruction" placeholder="Regen instruction… e.g. make it more concise, mention Python">
        </div>
        <div class="em-actions">
          <button class="em-btn em-regen" id="emRegen">↺ Regenerate</button>
          <div style="display:flex;gap:8px;">
            <button class="em-btn em-resume" id="emDownloadResume" style="display:none">⬇ Resume</button>
            <button class="em-btn em-send-api" id="emSendGmail" style="display:none">Send ✓</button>
            <button class="em-btn em-send" id="emOpenGmail">Open in Gmail →</button>
          </div>
        </div>
        <div id="emError" style="font-size:12px;color:#c00;margin-top:8px;display:none;"></div>
        <div id="emGmailStatus"></div>
      </div>
    </div>
  </div>

  <style>
    #emailOverlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    #emailModal {
      background: #fff; border-radius: 16px;
      width: 100%; max-width: 560px;
      box-shadow: 0 24px 60px rgba(0,0,0,.2);
      overflow: hidden;
      font-family: "Inter", system-ui, sans-serif;
    }
    .em-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid #f0f0f0;
    }
    .em-title { font-size: 15px; font-weight: 700; color: #111; }
    .em-close {
      background: #f0f0f0; border: none; border-radius: 50%;
      width: 28px; height: 28px; cursor: pointer;
      font-size: 12px; color: #555; display: flex; align-items: center; justify-content: center;
    }
    .em-close:hover { background: #e0e0e0; }

    .em-loading {
      display: flex; align-items: center; gap: 10px;
      padding: 32px 20px; font-size: 13px; color: #666;
    }
    .em-spinner {
      width: 18px; height: 18px; border: 2px solid #e0e0e0;
      border-top-color: #111; border-radius: 50%;
      animation: spin .7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #emForm { padding: 16px 20px 20px; display: flex; flex-direction: column; gap: 12px; }
    .em-field label {
      display: block; font-size: 11px; font-weight: 600;
      color: #888; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px;
    }
    .em-field input, .em-field textarea {
      width: 100%; padding: 9px 12px;
      border: 1px solid #e0e0e0; border-radius: 8px;
      font-size: 13px; font-family: inherit; color: #111;
      background: #fafafa; resize: vertical;
    }
    .em-field input:focus, .em-field textarea:focus {
      outline: none; border-color: #111; background: #fff;
    }
    .em-field input[readonly] { color: #555; cursor: default; }

    .em-instruction-row { margin-top: 4px; }
    .em-instruction-row input {
      width: 100%; padding: 8px 12px;
      border: 1px solid #e0e0e0; border-radius: 8px;
      font-size: 12px; font-family: inherit; color: #555;
      background: #fafafa;
    }
    .em-instruction-row input:focus { outline: none; border-color: #111; background: #fff; }
    .em-instruction-row input::placeholder { color: #bbb; }

    .em-actions {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 4px;
    }
    .em-btn {
      font-family: inherit; font-size: 12px; font-weight: 600;
      padding: 8px 16px; border-radius: 20px; border: none;
      cursor: pointer; transition: all .15s;
    }
    .em-regen   { background: #f0f0f0; color: #444; }
    .em-regen:hover { background: #e5e5e5; }
    .em-resume  { background: #f0f0f0; color: #444; }
    .em-resume:hover { background: #e5e5e5; }
    .em-send     { background: #111; color: #fff; }
    .em-send:hover { background: #333; box-shadow: 0 3px 10px rgba(0,0,0,.2); }
    .em-send-api { background: #057642; color: #fff; }
    .em-send-api:hover { background: #046236; box-shadow: 0 3px 10px rgba(0,0,0,.2); }
    .em-send-api:disabled { background: #aaa; cursor: not-allowed; }
    #emGmailStatus {
      font-size: 11px; color: #888; margin-top: 6px; min-height: 14px; text-align: right;
    }
  </style>

  <script src="llm.js"></script>
  <script src="gmail.js"></script>
  <script src="results.js"></script>
</body>
</html>
